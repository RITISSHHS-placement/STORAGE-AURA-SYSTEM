version: "3.9"

services:
  aura-storage:
    build: .
    container_name: aura-storage
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    volumes:
      - ./static:/app/static:ro
      - ./templates:/app/templates:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
